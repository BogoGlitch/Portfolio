name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'Portfolio.Api/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Portfolio.Api/Portfolio.Api.csproj

      - name: Build
        run: dotnet build Portfolio.Api/Portfolio.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Portfolio.Api/Portfolio.Api.csproj --configuration Release --no-build --output ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: portfolio-api-sb
          package: ./publish
