name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'Portfolio.Api/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Portfolio.Api/Portfolio.Api.csproj

      - name: Build
        run: dotnet build Portfolio.Api/Portfolio.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Portfolio.Api/Portfolio.Api.csproj --configuration Release --no-build --output ./publish

      - name: Install EF Tool
        run: dotnet tool install --global dotnet-ef --version '10.0.*'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Runner IP
        id: runner-ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Open SQL Firewall for Runner
        run: |
          az sql server firewall-rule create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server portfolio-sql-sb \
            --name github-actions-runner \
            --start-ip-address ${{ steps.runner-ip.outputs.ip }} \
            --end-ip-address ${{ steps.runner-ip.outputs.ip }}

      - name: Run EF Migrations
        run: dotnet ef database update --project Portfolio.Api/Portfolio.Api.csproj --configuration Release --no-build
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

      - name: Remove SQL Firewall Rule
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server portfolio-sql-sb \
            --name github-actions-runner

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: portfolio-api-sb
          package: ./publish
